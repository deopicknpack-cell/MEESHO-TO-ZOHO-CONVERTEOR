<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoho Invoice Converter</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    padding: 2.5rem 2.5rem 2rem;
    max-width: 520px;
    width: 100%;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.8rem;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: #1a56db;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 24px; height: 24px; fill: #fff; }

  .logo-text h1 { font-size: 18px; font-weight: 700; color: #111; }
  .logo-text p { font-size: 13px; color: #6b7280; margin-top: 2px; }

  .drop-zone {
    border: 2px dashed #c7d2fe;
    border-radius: 14px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f8f9ff;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: #1a56db;
    background: #eff6ff;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 48px;
    height: 48px;
    background: #dbeafe;
    border-radius: 12px;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .drop-icon svg { width: 26px; height: 26px; fill: #1a56db; }

  .drop-title { font-size: 15px; font-weight: 600; color: #1e3a5f; margin-bottom: 4px; }
  .drop-sub { font-size: 13px; color: #6b7280; }

  .file-info {
    display: none;
    align-items: center;
    gap: 10px;
    background: #f0fdf4;
    border: 1px solid #86efac;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 1.5rem;
  }

  .file-info.show { display: flex; }
  .file-info svg { width: 20px; height: 20px; fill: #16a34a; flex-shrink: 0; }
  .file-name { font-size: 13px; font-weight: 500; color: #166534; flex: 1; word-break: break-all; }
  .file-remove { background: none; border: none; cursor: pointer; color: #6b7280; font-size: 18px; line-height: 1; padding: 0 4px; }
  .file-remove:hover { color: #ef4444; }

  .btn-convert {
    width: 100%;
    background: #1a56db;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .btn-convert:hover:not(:disabled) { background: #1645b8; }
  .btn-convert:active:not(:disabled) { transform: scale(0.98); }
  .btn-convert:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-convert svg { width: 18px; height: 18px; fill: #fff; }

  .status-box {
    display: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 1rem;
    align-items: center;
    gap: 8px;
  }

  .status-box.show { display: flex; }
  .status-box.processing { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }
  .status-box.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .status-box.error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .status-box svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-download {
    display: none;
    width: 100%;
    background: #16a34a;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .btn-download.show { display: flex; }
  .btn-download:hover { background: #15803d; }
  .btn-download svg { width: 18px; height: 18px; fill: #fff; }

  .stats {
    display: none;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .stats.show { display: grid; }

  .stat-card {
    background: #f8fafc;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    border: 1px solid #e2e8f0;
  }

  .stat-num { font-size: 22px; font-weight: 700; color: #1a56db; }
  .stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; }

  .footer { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 1rem; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    </div>
    <div class="logo-text">
      <h1>Zoho Invoice Converter</h1>
      <p>Orders file → Zoho format, ek click mein</p>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
    </div>
    <div class="drop-title">Orders file yahan drop karo</div>
    <div class="drop-sub">ya click karke select karo (.xlsx file)</div>
  </div>

  <div class="file-info" id="fileInfo">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    <span class="file-name" id="fileName"></span>
    <button class="file-remove" id="removeFile" title="Remove">&#x2715;</button>
  </div>

  <div class="stats" id="statsBox">
    <div class="stat-card">
      <div class="stat-num" id="statRows">0</div>
      <div class="stat-label">Total Rows</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statInvoices">0</div>
      <div class="stat-label">Invoices</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDate">—</div>
      <div class="stat-label">Date</div>
    </div>
  </div>

  <div class="status-box" id="statusBox">
    <svg id="statusIcon" viewBox="0 0 24 24"></svg>
    <span id="statusText"></span>
  </div>

  <button class="btn-convert" id="btnConvert" disabled>
    <div class="spinner" id="spinner"></div>
    <svg id="convertIcon" viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6a6 6 0 0 1-5.65-4H4.26A8 8 0 0 0 12 20c4.42 0 8-3.58 8-8h3l-4-4zM9 8a6 6 0 0 1 5.65 4H16.74A8 8 0 0 0 12 4C7.58 4 4 7.58 4 12H1l4 4 4-4H6c0-3.31 2.69-6 6-6z"/></svg>
    Convert to Zoho Format
  </button>

  <button class="btn-download" id="btnDownload">
    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    Zoho File Download Karo
  </button>

  <div class="footer">File aapke browser mein hi process hoti hai — koi data server pe nahi jata</div>
</div>

<script>
const STATE_CODES = {
  'Andhra Pradesh':'AD','Arunachal Pradesh':'AR','Assam':'AS','Bihar':'BR',
  'Chhattisgarh':'CG','Goa':'GA','Gujarat':'GJ','Haryana':'HR',
  'Himachal Pradesh':'HP','Jharkhand':'JH','Karnataka':'KA','Kerala':'KL',
  'Madhya Pradesh':'MP','Maharashtra':'MH','Manipur':'MN','Meghalaya':'ML',
  'Mizoram':'MZ','Nagaland':'NL','Odisha':'OD','Punjab':'PB',
  'Rajasthan':'RJ','Sikkim':'SK','Tamil Nadu':'TN','Telangana':'TS',
  'Tripura':'TR','Uttar Pradesh':'UP','Uttarakhand':'UK','West Bengal':'WB',
  'Delhi':'DL','Chandigarh':'CH','Jammu and Kashmir':'JK','Ladakh':'LA',
  'West bengal':'WB','DELHI':'DL','Uttrakhand':'UK','Jharkhand':'JH',
};

const NOTES = "Thanks for your business.";
const TERMS = "The purchased material is strictly for self-consumption and not for resale. Payment Terms: Payments must be made within the due date; late payments will incur an 18% per annum interest. Taxes & Duties: GST and other applicable taxes are extra as per government norms. Order Confirmation: Once an order is confirmed, it cannot be canceled or modified. Claims & Returns: Any claims for defects or damages must be reported within 48 hours.";

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const removeFile = document.getElementById('removeFile');
const btnConvert = document.getElementById('btnConvert');
const btnDownload = document.getElementById('btnDownload');
const statusBox = document.getElementById('statusBox');
const statusText = document.getElementById('statusText');
const statusIcon = document.getElementById('statusIcon');
const statsBox = document.getElementById('statsBox');
const spinner = document.getElementById('spinner');
const convertIcon = document.getElementById('convertIcon');

let selectedFile = null;
let outputWorkbook = null;

function setStatus(type, msg) {
  statusBox.className = 'status-box show ' + type;
  statusText.textContent = msg;
  if (type === 'processing') {
    statusIcon.innerHTML = '<circle cx="12" cy="12" r="10" stroke="#92400e" stroke-width="2" fill="none"/><path d="M12 6v6l4 2" stroke="#92400e" stroke-width="2" fill="none"/>';
  } else if (type === 'success') {
    statusIcon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="#166534"/>';
  } else {
    statusIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#991b1b"/>';
  }
}

function hideStatus() { statusBox.className = 'status-box'; }

function clean(val) {
  if (val === null || val === undefined) return '';
  const s = String(val).trim();
  if (s === 'nan' || s === 'undefined' || s === '-') return '';
  return s;
}

function cleanPin(val) {
  let s = clean(val);
  if (s.endsWith('.0')) s = s.slice(0, -2);
  return s;
}

function formatDate(val) {
  if (!val) return '';
  if (typeof val === 'number') {
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().slice(0, 10);
  }
  const d = new Date(val);
  if (!isNaN(d)) return d.toISOString().slice(0, 10);
  return String(val).slice(0, 10);
}

function getPOS(state) {
  if (!state) return '';
  return STATE_CODES[state.trim()] || state.trim().slice(0, 2).toUpperCase();
}

function getTaxInfo(row) {
  const cgst = clean(row['CGST']);
  const shippingState = clean(row['*Shipping State']).toLowerCase();
  const sellerState = clean(row['Seller State']).toLowerCase();
  if (shippingState === sellerState || (cgst && cgst !== '')) {
    return ['GST18', 'Tax Group'];
  }
  return ['IGST18', 'ItemAmount'];
}

function handleFile(file) {
  if (!file) return;
  if (!file.name.match(/\.xlsx?$/i)) {
    setStatus('error', 'Sirf .xlsx file select karo!');
    return;
  }
  selectedFile = file;
  fileName.textContent = file.name;
  fileInfo.classList.add('show');
  dropZone.style.display = 'none';
  btnConvert.disabled = false;
  btnDownload.classList.remove('show');
  statsBox.classList.remove('show');
  hideStatus();
  outputWorkbook = null;
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

removeFile.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  fileInfo.classList.remove('show');
  dropZone.style.display = '';
  btnConvert.disabled = true;
  btnDownload.classList.remove('show');
  statsBox.classList.remove('show');
  hideStatus();
  outputWorkbook = null;
});

btnConvert.addEventListener('click', () => {
  if (!selectedFile) return;
  spinner.style.display = 'block';
  convertIcon.style.display = 'none';
  btnConvert.disabled = true;
  setStatus('processing', 'File process ho rahi hai...');
  btnDownload.classList.remove('show');

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: false });

      const sheetName = wb.SheetNames.find(s => s.toLowerCase().includes('order')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (!rows.length) throw new Error('Orders sheet mein data nahi mila!');

      const zohoRows = [];
      const invoiceSet = new Set();
      let sampleDate = '';

      rows.forEach(row => {
        const invDate = formatDate(row['Date '] || row['Date']);
        if (!sampleDate && invDate) sampleDate = invDate.slice(5).split('-').reverse().join('/');

        const custName = clean(row['Customer Name']);
        const phone = clean(row['Customer Phone']);
        const gstin = clean(row['GSTIN']);
        const displayName = (gstin && phone) ? `${custName}-${phone}` : custName;

        // GST Treatment: valid 15-digit GSTIN ho to business_gst, warna business_none
        const gstinRegex = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
        const gstTreatment = gstinRegex.test(gstin) ? 'business_gst' : 'business_none';

        const shippingState = clean(row['*Shipping State']);
        const pos = getPOS(shippingState);
        const [itemTax, itemTaxType] = getTaxInfo(row);

        const addr1 = clean(row['*Shipping Address Line1']);
        const addr2 = clean(row['Shipping Address Line2']);
        const city = clean(row['*Shipping City']);
        const shipPin = cleanPin(row['*Shipping Pincode']);
        const fullAddr = addr1 + (addr2 ? ', ' + addr2 : '');

        let itemPrice = row['Product per unit'];
        if (itemPrice === '' || itemPrice === null || itemPrice === undefined) {
          itemPrice = row['Unit Item Price'];
        }

        let hsn = clean(row['Item HSN']);
        if (hsn.endsWith('.0')) hsn = hsn.slice(0, -2);

        invoiceSet.add(clean(row['Voucher number']));

        zohoRows.push({
          'Invoice Number': clean(row['Voucher number']),
          'Invoice Date': invDate,
          'Customer Name': displayName,
          'GST Treatment': gstTreatment,
          'GST Identification Number (GSTIN)': gstin,
          'Place of Supply': pos,
          'Sales order id': clean(row['Order ID']),
          'Payment Terms': 0,
          'Payment Terms Label': 'Paid',
          'Due Date': invDate,
          'Currency Code': 'INR',
          'Exchange Rate': 1,
          'Account': 'Sales',
          'SKU': clean(row['Item SKUs Code']),
          'Item Name': clean(row['Item SKU Name']),
          'Item Desc': '',
          'Item Type': 'goods',
          'HSN/SAC': hsn,
          'Quantity': row['Item Quantity'] || 1,
          'Usage unit': 'pcs',
          'Item Price': itemPrice,
          'Is Inclusive Tax': false,
          'Item Tax': itemTax,
          'Item Tax Type': itemTaxType,
          'Item Tax %': 18,
          'Is Discount Before Tax': true,
          'Entity Discount Percent': 0,
          'Entity Discount Amount': 0,
          'Discount': 0,
          'Discount Amount': 0,
          'Adjustment': 0,
          'Adjustment Description': 'Adjustment',
          'Notes': NOTES,
          'Terms & Conditions': TERMS,
          'E-Commerce Operator Name': 'Picknpack ecommerce',
          'E-Commerce Operator GSTIN': '07AAMCP7214N1ZW',
          'Branch Name': 'Delhi- Online',
          'Email': clean(row['Customer Email']),
          'MOBILE NO': phone,
          'Billing Address Line 1': addr1,
          'Billing Address Line 2': addr2,
          'Billing city': city,
          'Billing State': shippingState,
          'Billing Country': 'India',
          'Billing Pin code': shipPin,
          'Shipping Address Line 1': addr1,
          'Shipping Address Line 2': addr2,
          'Shipping City': city,
          'Shipping State': shippingState,
          'Shipping Country': 'India',
          'Shipping Pin code': shipPin,
          'Accounts Receivable': 'Accounts Receivable',
          'Ack No.:': '',
          'IRN :': '',
        });
      });

      const newWb = XLSX.utils.book_new();
      const newWs = XLSX.utils.json_to_sheet(zohoRows);

      const colWidths = [18,13,28,14,22,14,26,14,16,13,12,13,10,15,45,10,10,12,10,11,11,15,10,13,11,20,22,22,10,14,11,20,20,20,22,22,14,45,30,13,16,15,45,16,16,10,10,18,14,18,14];
      newWs['!cols'] = colWidths.map(w => ({ wch: w }));

      XLSX.utils.book_append_sheet(newWb, newWs, 'zoho formate');
      outputWorkbook = newWb;

      document.getElementById('statRows').textContent = zohoRows.length;
      document.getElementById('statInvoices').textContent = invoiceSet.size;
      document.getElementById('statDate').textContent = sampleDate || '—';
      statsBox.classList.add('show');

      setStatus('success', `${zohoRows.length} rows convert ho gayi! Ab download karo.`);
      btnDownload.classList.add('show');
    } catch(err) {
      setStatus('error', 'Error: ' + err.message);
    } finally {
      spinner.style.display = 'none';
      convertIcon.style.display = '';
      btnConvert.disabled = false;
    }
  };
  reader.readAsArrayBuffer(selectedFile);
});

btnDownload.addEventListener('click', () => {
  if (!outputWorkbook) return;
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(outputWorkbook, `zoho_import_${today}.xlsx`);
});
</script>
</body>
</html>
